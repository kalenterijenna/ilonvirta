<title>Yhteys — Ilon Virta Mikkeli</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#141414;--dark-2:#1C1C1C;--dark-3:#242424;
  --white:#FFFFFF;--light:#FFFFFF;--light-2:#F6F6F6;
  --ink:#1A1A1A;--muted-ink:#666666;
  --muted:rgba(255,255,255,0.38);
  --gold:#D4A843;--gold-dark:#B8892A;--gold-dim:rgba(212,168,67,0.12);
  --border:rgba(255,255,255,0.07);--border-2:rgba(255,255,255,0.12);
  --border-light:rgba(0,0,0,0.09);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);overflow-x:hidden;font-weight:300;line-height:1.7}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .75s cubic-bezier(.16,1,.3,1),transform .75s cubic-bezier(.16,1,.3,1)}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.08s}.d2{transition-delay:.16s}.d3{transition-delay:.24s}.d4{transition-delay:.32s}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:999;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1.2rem,4vw,4rem);height:60px;background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-light);gap:1rem}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink);text-decoration:none;flex-shrink:0}
.nav-logo em{color:var(--gold);font-style:normal}
.nav-links{display:flex;gap:1.8rem;list-style:none}
.nav-links a{font-size:0.65rem;font-weight:400;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted-ink);text-decoration:none;white-space:nowrap;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.nav-cta{font-size:0.62rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--white);background:var(--dark);padding:0.5rem 1.3rem;text-decoration:none;flex-shrink:0;transition:background .2s;white-space:nowrap}
.nav-cta:hover{background:var(--gold)}
.nav-ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;flex-shrink:0}
.nav-ham span{width:22px;height:1.5px;background:var(--ink);display:block;transition:all .3s}
.nav-ham.active span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.nav-ham.active span:nth-child(2){opacity:0}
.nav-ham.active span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:rgba(255,255,255,.99);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-light);padding:0.5rem clamp(1.2rem,4vw,4rem) 1.5rem;z-index:998;flex-direction:column}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted-ink);text-decoration:none;padding:0.9rem 0;border-bottom:1px solid var(--border-light);transition:color .2s}
.mobile-menu a:hover{color:var(--gold)}
.mobile-menu a:last-child{border-bottom:none}
.mobile-menu .mob-cta{margin-top:1rem;background:var(--gold);color:var(--white);text-align:center;padding:0.8rem;border-bottom:none;letter-spacing:0.2em}
.mobile-menu .mob-cta:hover{background:var(--dark)}

/* HERO */
.page-hero{margin-top:60px;position:relative;overflow:hidden}
.ph-img{position:absolute;inset:0;background:url('https://images.pexels.com/photos/1209978/pexels-photo-1209978.jpeg?auto=compress&cs=tinysrgb&w=1400') center 35%/cover no-repeat;animation:subtle-zoom 20s ease-in-out infinite alternate}
.ph-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,20,20,0.48) 0%,rgba(20,20,20,0.66) 50%,rgba(20,20,20,0.92) 100%)}
.ph-inner{position:relative;z-index:2;min-height:44vh;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(3rem,6vh,5rem) clamp(1.5rem,5vw,5rem);max-width:740px}
.ph-kicker{font-size:0.62rem;font-weight:500;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:1.4rem;display:flex;align-items:center;gap:10px}
.ph-kicker::before{content:'';width:24px;height:1px;background:var(--gold);opacity:0.6}
.ph-h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,5.5vw,5.5rem);font-weight:300;line-height:0.97;letter-spacing:-0.02em;color:var(--white);margin-bottom:1.2rem}
.ph-h1 em{font-style:italic;color:var(--gold);display:block;margin-top:0.05em}
.ph-sub{font-size:0.92rem;color:rgba(255,255,255,0.55);max-width:500px;line-height:1.8}

/* GLOBAL SECTIONS */
.kicker{font-size:0.62rem;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;gap:0.7rem}
.kicker::after{content:'';height:1px;width:28px;background:var(--gold);opacity:0.5;display:inline-block}
.sec-h2{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,3.8vw,3.4rem);font-weight:300;line-height:1.08;letter-spacing:-0.01em;color:var(--ink);margin-bottom:1rem}
.sec-h2 em{font-style:italic;color:var(--gold)}
.rule{width:36px;height:1px;background:var(--gold);margin:1.4rem 0;opacity:0.5}
.sec-body,.contact-intro{font-size:0.92rem;color:var(--muted-ink);line-height:1.85;margin-bottom:1.3rem;max-width:560px}

/* PASTORS */
.pastors-section{background:var(--light-2);padding:clamp(4rem,8vh,7rem) clamp(1.5rem,5vw,5rem);border-bottom:1px solid var(--border-light)}
.pastors-grid{display:grid;grid-template-columns:0.95fr 1.15fr;gap:clamp(2.5rem,6vw,7rem);align-items:center}
.pastors-photo{position:relative;min-height:540px;background:var(--dark-3);overflow:hidden}
.pastors-photo img{width:100%;height:100%;min-height:540px;object-fit:cover;display:block;filter:saturate(0.96) contrast(1.02)}
.pastors-photo::after{content:'';position:absolute;inset:auto 0 0 0;height:38%;background:linear-gradient(to top,rgba(20,20,20,.55),rgba(20,20,20,0));pointer-events:none}
.pastors-nameplate{position:absolute;left:1.5rem;right:1.5rem;bottom:1.5rem;z-index:2;background:rgba(20,20,20,.68);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(16px);padding:1.2rem 1.4rem;color:var(--white)}
